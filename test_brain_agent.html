<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain & Agent Routes Tester</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .panel {
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        padding: 24px;
      }
      h2 {
        color: #333;
        margin-bottom: 16px;
        font-size: 18px;
        border-bottom: 2px solid #667eea;
        padding-bottom: 8px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #555;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 12px;
        background: #f9f9f9;
        transition: all 0.2s;
      }
      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      textarea {
        resize: vertical;
        min-height: 80px;
        font-size: 13px;
      }
      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }
      button:hover {
        background: #5568d3;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }
      button:active {
        transform: translateY(0);
      }
      .output {
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 12px;
        font-family: "Monaco", "Menlo", monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        color: #333;
        margin-top: 12px;
      }
      .output.success {
        background: #f0fdf4;
        border-color: #86efac;
        color: #166534;
      }
      .output.error {
        background: #fef2f2;
        border-color: #fca5a5;
        color: #991b1b;
      }
      .output.loading {
        background: #eff6ff;
        border-color: #93c5fd;
        color: #1e40af;
      }
      .status {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-top: 8px;
      }
      .status.ready {
        background: #dbeafe;
        color: #0c4a6e;
      }
      .status.loading {
        background: #fef3c7;
        color: #92400e;
      }
      .status.error {
        background: #fee2e2;
        color: #7f1d1d;
      }
      .endpoint-group {
        margin-bottom: 24px;
      }
      .endpoint-name {
        font-size: 12px;
        font-weight: 700;
        color: #667eea;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        border-bottom: 2px solid #eee;
      }
      .tab-btn {
        flex: 1;
        padding: 10px;
        background: transparent;
        color: #999;
        border: none;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        font-weight: 600;
        font-size: 12px;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .tab-btn.active {
        color: #667eea;
        border-bottom-color: #667eea;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .auth-section {
        background: #f0f7ff;
        border: 2px dashed #93c5fd;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .auth-status {
        font-size: 12px;
        padding: 8px 12px;
        border-radius: 4px;
        margin-top: 8px;
      }
      .auth-status.authed {
        background: #d1fae5;
        color: #065f46;
      }
      .auth-status.notauthed {
        background: #fee2e2;
        color: #991b1b;
      }
      code {
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Auth & Config Panel -->
      <div class="panel">
        <h2>🔐 Authentication & Config</h2>

        <div class="auth-section">
          <label>Backend URL</label>
          <input
            type="text"
            id="backendUrl"
            value="http://localhost:3000"
            placeholder="http://localhost:3000"
          />

          <label style="margin-top: 12px"
            >Firebase ID Token (or leave blank for no auth)</label
          >
          <textarea
            id="firebaseToken"
            placeholder="Paste your Firebase ID token here..."
          ></textarea>

          <button onclick="testConnection()">Test Connection</button>
          <div id="authStatus" class="auth-status notauthed">
            Not authenticated
          </div>
        </div>

        <h2 style="margin-top: 24px">Session Configuration</h2>
        <div class="form-group">
          <label>Session ID</label>
          <input
            type="text"
            id="sessionId"
            value="test-session-"
            placeholder="test-session-"
          />
          <button
            onclick="generateSessionId()"
            style="margin-top: 8px; background: #764ba2"
          >
            Generate New ID
          </button>
        </div>

        <div class="form-group">
          <label>Entry Screen</label>
          <select id="entryScreen">
            <option value="direct">direct</option>
            <option value="discover">discover</option>
            <option value="studio">studio</option>
            <option value="launch">launch</option>
            <option value="profile">profile</option>
          </select>
        </div>

        <div
          id="configOutput"
          class="output"
          style="margin-top: 16px; display: none"
        ></div>
      </div>

      <!-- Brain Routes -->
      <div class="panel">
        <h2>🧠 Brain Routes</h2>

        <div class="endpoint-group">
          <div class="endpoint-name">POST /brain/chat</div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="chatMessage" placeholder="Type your message here...">
Can you help me with a viral video idea?</textarea
            >
          </div>
          <div class="form-group">
            <label>Context (optional)</label>
            <textarea
              id="chatContext"
              placeholder='{"platform": "instagram", "format": "reel"}'
              style="min-height: 60px"
            ></textarea>
          </div>
          <button onclick="sendChat()">Send Chat</button>
          <div id="chatOutput" class="output" style="display: none"></div>
        </div>

        <div class="endpoint-group" style="margin-top: 20px">
          <div class="endpoint-name">GET /brain/greet</div>
          <button onclick="sendGreet()">Get Greeting</button>
          <div id="greetOutput" class="output" style="display: none"></div>
        </div>

        <div class="endpoint-group" style="margin-top: 20px">
          <div class="endpoint-name">POST /brain/chat/stream</div>
          <div class="form-group">
            <label>Message (Stream)</label>
            <textarea
              id="streamMessage"
              placeholder="Type message for streaming response..."
            >
Stream me some trendy ideas</textarea
            >
          </div>
          <button onclick="sendStream()">Stream Chat</button>
          <div id="streamOutput" class="output" style="display: none"></div>
        </div>
      </div>

      <!-- Agent Routes -->
      <div class="panel">
        <h2>🤖 Agent Routes</h2>

        <div class="endpoint-group">
          <div class="endpoint-name">POST /agent/message</div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="agentMessage" placeholder="Type your message...">
Hey, what's trending today?</textarea
            >
          </div>
          <button onclick="sendAgentMessage()">Send Message</button>
          <div
            id="agentMessageOutput"
            class="output"
            style="display: none"
          ></div>
        </div>

        <div class="endpoint-group" style="margin-top: 20px">
          <div class="endpoint-name">GET /agent/memory</div>
          <button onclick="getMemory()">Get Memory</button>
          <div id="memoryOutput" class="output" style="display: none"></div>
        </div>

        <div class="endpoint-group" style="margin-top: 20px">
          <div class="endpoint-name">DELETE /agent/memory/:key</div>
          <div class="form-group">
            <label>Memory Key</label>
            <input type="text" id="memoryKey" placeholder="user_preferences" />
          </div>
          <button onclick="deleteMemory()">Delete Memory</button>
          <div
            id="deleteMemoryOutput"
            class="output"
            style="display: none"
          ></div>
        </div>
      </div>

      <!-- Request History -->
      <div class="panel">
        <h2>📋 Request History</h2>
        <div
          id="history"
          style="font-size: 12px; max-height: 400px; overflow-y: auto"
        >
          <p style="color: #999">Requests will appear here...</p>
        </div>
        <button
          onclick="clearHistory()"
          style="margin-top: 12px; background: #999"
        >
          Clear History
        </button>
      </div>
    </div>

    <script>
      const API_V1_PREFIX = "/api/v1";
      let requestHistory = [];

      function getBackendUrl() {
        return document.getElementById("backendUrl").value;
      }

      function getHeaders() {
        const headers = { "Content-Type": "application/json" };
        const token = document.getElementById("firebaseToken").value?.trim();
        if (token) {
          headers["Authorization"] = `Bearer ${token}`;
        }
        return headers;
      }

      function getSessionId() {
        return (
          document.getElementById("sessionId").value || `session-${Date.now()}`
        );
      }

      async function testConnection() {
        const url = `${getBackendUrl()}${API_V1_PREFIX}/brain/greet?sessionId=test`;
        try {
          const response = await fetch(url, { headers: getHeaders() });
          const data = await response.json();
          const statusEl = document.getElementById("authStatus");
          if (response.ok) {
            statusEl.className = "auth-status authed";
            statusEl.textContent =
              "✓ Connected! Response: " +
              JSON.stringify(data).substring(0, 50) +
              "...";
          } else {
            statusEl.className = "auth-status notauthed";
            statusEl.textContent =
              "✗ Error: " + (data.error || response.statusText);
          }
        } catch (err) {
          document.getElementById("authStatus").className =
            "auth-status notauthed";
          document.getElementById("authStatus").textContent =
            "✗ Connection failed: " + err.message;
        }
      }

      function generateSessionId() {
        const id = `session-${Date.now()}`;
        document.getElementById("sessionId").value = id;
      }

      function addToHistory(endpoint, method, status) {
        const time = new Date().toLocaleTimeString();
        const entry = `[${time}] ${method} ${endpoint} - ${status}`;
        requestHistory.unshift(entry);
        if (requestHistory.length > 50) requestHistory.pop();
        updateHistory();
      }

      function updateHistory() {
        const historyEl = document.getElementById("history");
        historyEl.innerHTML = requestHistory
          .map((entry) => `<div>${entry}</div>`)
          .join("");
      }

      function clearHistory() {
        requestHistory = [];
        updateHistory();
      }

      function showOutput(elementId, data, isError = false) {
        const el = document.getElementById(elementId);
        el.style.display = "block";
        el.className = `output ${isError ? "error" : "success"}`;
        el.textContent =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);
      }

      async function sendChat() {
        const message = document.getElementById("chatMessage").value;
        const context = document.getElementById("chatContext").value;
        const sessionId = getSessionId();
        const entryScreen = document.getElementById("entryScreen").value;

        if (!message) {
          showOutput("chatOutput", "Please enter a message", true);
          return;
        }

        const body = {
          message,
          sessionId,
          entryScreen,
        };

        if (context) {
          try {
            body.context = JSON.parse(context);
          } catch {
            showOutput("chatOutput", "Invalid JSON in context field", true);
            return;
          }
        }

        try {
          const url = `${getBackendUrl()}${API_V1_PREFIX}/brain/chat`;
          const response = await fetch(url, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify(body),
          });
          const data = await response.json();
          addToHistory(
            "/brain/chat",
            "POST",
            response.ok ? "200" : response.status,
          );
          showOutput("chatOutput", data, !response.ok);
        } catch (err) {
          addToHistory("/brain/chat", "POST", "ERROR");
          showOutput("chatOutput", `Error: ${err.message}`, true);
        }
      }

      async function sendGreet() {
        const sessionId = getSessionId();
        const entryScreen = document.getElementById("entryScreen").value;

        try {
          const url = `${getBackendUrl()}${API_V1_PREFIX}/brain/greet?sessionId=${sessionId}&entryScreen=${entryScreen}`;
          const response = await fetch(url, { headers: getHeaders() });
          const data = await response.json();
          addToHistory(
            "/brain/greet",
            "GET",
            response.ok ? "200" : response.status,
          );
          showOutput("greetOutput", data, !response.ok);
        } catch (err) {
          addToHistory("/brain/greet", "GET", "ERROR");
          showOutput("greetOutput", `Error: ${err.message}`, true);
        }
      }

      async function sendStream() {
        const message = document.getElementById("streamMessage").value;
        const sessionId = getSessionId();

        if (!message) {
          showOutput("streamOutput", "Please enter a message", true);
          return;
        }

        try {
          const url = `${getBackendUrl()}${API_V1_PREFIX}/brain/chat/stream`;
          const response = await fetch(url, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({ message, sessionId }),
          });

          const outputEl = document.getElementById("streamOutput");
          outputEl.style.display = "block";
          outputEl.className = "output loading";
          outputEl.textContent = "Streaming response...";

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullText = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            fullText += decoder.decode(value);
            outputEl.textContent = fullText;
            outputEl.scrollTop = outputEl.scrollHeight;
          }

          addToHistory("/brain/chat/stream", "POST", "200");
          outputEl.className = "output success";
        } catch (err) {
          addToHistory("/brain/chat/stream", "POST", "ERROR");
          showOutput("streamOutput", `Error: ${err.message}`, true);
        }
      }

      async function sendAgentMessage() {
        const message = document.getElementById("agentMessage").value;
        const sessionId = getSessionId();

        if (!message) {
          showOutput("agentMessageOutput", "Please enter a message", true);
          return;
        }

        try {
          const url = `${getBackendUrl()}${API_V1_PREFIX}/agent/message`;
          const response = await fetch(url, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify({ message, sessionId }),
          });
          const data = await response.json();
          addToHistory(
            "/agent/message",
            "POST",
            response.ok ? "200" : response.status,
          );
          showOutput("agentMessageOutput", data, !response.ok);
        } catch (err) {
          addToHistory("/agent/message", "POST", "ERROR");
          showOutput("agentMessageOutput", `Error: ${err.message}`, true);
        }
      }

      async function getMemory() {
        try {
          const url = `${getBackendUrl()}${API_V1_PREFIX}/agent/memory`;
          const response = await fetch(url, { headers: getHeaders() });
          const data = await response.json();
          addToHistory(
            "/agent/memory",
            "GET",
            response.ok ? "200" : response.status,
          );
          showOutput("memoryOutput", data, !response.ok);
        } catch (err) {
          addToHistory("/agent/memory", "GET", "ERROR");
          showOutput("memoryOutput", `Error: ${err.message}`, true);
        }
      }

      async function deleteMemory() {
        const key = document.getElementById("memoryKey").value;
        if (!key) {
          showOutput("deleteMemoryOutput", "Please enter a memory key", true);
          return;
        }

        try {
          const url = `${getBackendUrl()}${API_V1_PREFIX}/agent/memory/${encodeURIComponent(key)}`;
          const response = await fetch(url, {
            method: "DELETE",
            headers: getHeaders(),
          });
          const data = await response.json();
          addToHistory(
            `/agent/memory/${key}`,
            "DELETE",
            response.ok ? "200" : response.status,
          );
          showOutput("deleteMemoryOutput", data, !response.ok);
        } catch (err) {
          addToHistory("/agent/memory/:key", "DELETE", "ERROR");
          showOutput("deleteMemoryOutput", `Error: ${err.message}`, true);
        }
      }

      // Initialize
      generateSessionId();
    </script>
  </body>
</html>
